name: Capture site screenshots

on:
  workflow_dispatch:
  push:
    branches:
      - main
    paths:
      - 'index.html'
      - 'scripts/screenshot.js'
      - '.github/workflows/screenshots.yml'

permissions:
  contents: write

env:
  SITE_URL: https://1kimagency.github.io/kim-ai-school/
  OUTPUT_DIR: screenshots

jobs:
  capture:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install Playwright
        run: |
          npm init -y
          npm install --save-dev playwright
          npx playwright install --with-deps chromium

      - name: Capture screenshots
        run: node scripts/screenshot.js

      - name: Upload screenshots artifact
        uses: actions/upload-artifact@v4
        with:
          name: site-screenshots
          path: screenshots/*.png
          if-no-files-found: error

      - name: Commit screenshots
        uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_message: 'Update site screenshots [skip ci]'
          file_pattern: screenshots/*.png
